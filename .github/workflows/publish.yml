name: Build and Publish Release

on:
  push:
    tags:
      - 'v*' # Dispara ao empurrar tags como v1.0.0, v1.1.0, etc.
  workflow_dispatch: # Permite disparar manualmente pela interface do GitHub

permissions:
  contents: write # Essencial para permitir o upload dos assets para o GitHub Releases

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build -- --publish always
